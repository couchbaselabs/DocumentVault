<svg width="1000" height="700" viewBox="0 0 1000 700" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
        </marker>
    </defs>
    
    <rect width="1000" height="700" fill="#ffffff" />
    <text x="500" y="40" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle" fill="#333">Sequence: Create Order</text>

    <line x1="150" y1="80" x2="150" y2="650" stroke="#333" stroke-width="2" stroke-dasharray="5,5" />
    <line x1="350" y1="80" x2="350" y2="650" stroke="#333" stroke-width="2" stroke-dasharray="5,5" />
    <line x1="550" y1="80" x2="550" y2="650" stroke="#333" stroke-width="2" stroke-dasharray="5,5" />
    <line x1="750" y1="80" x2="750" y2="650" stroke="#333" stroke-width="2" stroke-dasharray="5,5" />
    <line x1="900" y1="80" x2="900" y2="650" stroke="#333" stroke-width="2" stroke-dasharray="5,5" />

    <rect x="80" y="50" width="140" height="40" rx="5" fill="#e9ecef" stroke="#333" />
    <text x="150" y="75" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">OrderFormDialog</text>
    
    <rect x="280" y="50" width="140" height="40" rx="5" fill="#e9ecef" stroke="#333" />
    <text x="350" y="75" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">InventoryScreen</text>
    
    <rect x="480" y="50" width="140" height="40" rx="5" fill="#d2232a" stroke="#333" />
    <text x="550" y="75" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle" fill="white">DatabaseManager</text>
    
    <rect x="680" y="50" width="140" height="40" rx="5" fill="#2c3e50" stroke="#333" />
    <text x="750" y="75" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle" fill="white">AppSyncManager</text>
    
    <rect x="830" y="50" width="140" height="40" rx="5" fill="#fcf3cf" stroke="#f39c12" />
    <text x="900" y="75" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">App Services</text>

    <path d="M150 150 L350 150" stroke="#333" stroke-width="2" marker-end="url(#arrow)" />
    <text x="250" y="145" font-family="Arial" font-size="10" text-anchor="middle">onCreateOrder(qty)</text>

    <path d="M350 200 L550 200" stroke="#333" stroke-width="2" marker-end="url(#arrow)" />
    <text x="450" y="195" font-family="Arial" font-size="10" text-anchor="middle">createOrder(item, qty)</text>

    <rect x="545" y="220" width="10" height="80" fill="#d2232a" />
    <text x="560" y="240" font-family="Arial" font-size="10">generateNanoId()</text>
    <text x="560" y="260" font-family="Arial" font-size="10">MutableDocument()</text>
    <text x="560" y="280" font-family="Arial" font-size="10">collection.save()</text>

    <path d="M550 350 L750 350" stroke="#333" stroke-width="2" marker-end="url(#arrow)" />
    <text x="650" y="345" font-family="Arial" font-size="10" text-anchor="middle">pushDocumentImmediately()</text>

    <path d="M750 400 L900 400" stroke="#f39c12" stroke-width="2" marker-end="url(#arrow)" />
    <text x="825" y="395" font-family="Arial" font-size="10" text-anchor="middle" fill="#a04000">Continuous Push</text>

    <path d="M900 450 L750 450" stroke="#f39c12" stroke-width="2" stroke-dasharray="3,3" marker-end="url(#arrow)" />
    <path d="M750 500 L550 500" stroke="#333" stroke-width="2" stroke-dasharray="3,3" marker-end="url(#arrow)" />
    <path d="M550 550 L350 550" stroke="#333" stroke-width="2" stroke-dasharray="3,3" marker-end="url(#arrow)" />
    <path d="M350 600 L150 600" stroke="#333" stroke-width="2" stroke-dasharray="3,3" marker-end="url(#arrow)" />
    <text x="250" y="595" font-family="Arial" font-size="10" text-anchor="middle">Order Form Closes</text>
</svg>
