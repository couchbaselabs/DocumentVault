<svg width="1000" height="550" viewBox="0 0 1000 550" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
        </marker>
        <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#f39c12" />
        </marker>
    </defs>
    <rect width="1000" height="550" fill="#ffffff" />
    <text x="500" y="40" font-family="Arial" font-size="22" font-weight="bold" text-anchor="middle" fill="#333">Sequence: Update Grocery Item Quantity</text>

    <line x1="80" y1="80" x2="80" y2="500" stroke="#333" stroke-width="2" stroke-dasharray="5,5" />
    <line x1="240" y1="80" x2="240" y2="500" stroke="#333" stroke-width="2" stroke-dasharray="5,5" />
    <line x1="420" y1="80" x2="420" y2="500" stroke="#333" stroke-width="2" stroke-dasharray="5,5" />
    <line x1="600" y1="80" x2="600" y2="500" stroke="#333" stroke-width="2" stroke-dasharray="5,5" />
    <line x1="780" y1="80" x2="780" y2="500" stroke="#333" stroke-width="2" stroke-dasharray="5,5" />
    <line x1="920" y1="80" x2="920" y2="500" stroke="#333" stroke-width="2" stroke-dasharray="5,5" />

    <rect x="20" y="50" width="120" height="40" rx="5" fill="#e9ecef" stroke="#333" />
    <text x="80" y="75" font-family="Arial" font-size="10" font-weight="bold" text-anchor="middle">ItemCard</text>
    
    <rect x="180" y="50" width="120" height="40" rx="5" fill="#e9ecef" stroke="#333" />
    <text x="240" y="75" font-family="Arial" font-size="10" font-weight="bold" text-anchor="middle">InventoryScreen</text>
    
    <rect x="350" y="50" width="140" height="40" rx="5" fill="#d2232a" stroke="#333" />
    <text x="420" y="75" font-family="Arial" font-size="10" font-weight="bold" text-anchor="middle" fill="white">DatabaseManager</text>
    
    <rect x="530" y="50" width="140" height="40" rx="5" fill="#2c3e50" stroke="#333" />
    <text x="600" y="75" font-family="Arial" font-size="10" font-weight="bold" text-anchor="middle" fill="white">AppSyncManager</text>
    
    <rect x="710" y="50" width="140" height="40" rx="5" fill="#00a3e0" stroke="#333" />
    <text x="780" y="75" font-family="Arial" font-size="10" font-weight="bold" text-anchor="middle" fill="white">Engine</text>

    <rect x="850" y="50" width="140" height="40" rx="5" fill="#fcf3cf" stroke="#f39c12" />
    <text x="920" y="75" font-family="Arial" font-size="10" font-weight="bold" text-anchor="middle" fill="#a04000">Capella</text>

    <path d="M80 140 L240 140" stroke="#333" stroke-width="2" marker-end="url(#arrow)" />
    <text x="160" y="135" font-family="Arial" font-size="10" text-anchor="middle">1. onQuantityChanged(qty)</text>

    <path d="M240 180 L420 180" stroke="#333" stroke-width="2" marker-end="url(#arrow)" />
    <text x="330" y="175" font-family="Arial" font-size="10" text-anchor="middle">2. updateQuantityWithSync()</text>

    <path d="M420 220 L780 220" stroke="#333" stroke-width="2" marker-end="url(#arrow)" />
    <text x="600" y="215" font-family="Arial" font-size="10" text-anchor="middle">3. collection.save(mutableDoc)</text>

    <path d="M420 280 L600 280" stroke="#333" stroke-width="2" marker-end="url(#arrow)" />
    <text x="510" y="275" font-family="Arial" font-size="10" text-anchor="middle">4. pushDocumentImmediately()</text>

    <path d="M600 340 L920 340" stroke="#f39c12" stroke-width="2" marker-end="url(#arrowOrange)" />
    <text x="760" y="335" font-family="Arial" font-size="10" text-anchor="middle" fill="#a04000">5. Continuous Replicator Push</text>

    <path d="M920 450 L80 450" stroke="#333" stroke-width="2" stroke-dasharray="3,3" marker-end="url(#arrow)" />
    <text x="500" y="445" font-family="Arial" font-size="10" text-anchor="middle">Change Propagated to Cloud and UI Listeners</text>
</svg>
